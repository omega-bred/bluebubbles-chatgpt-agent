// Provide secrets from 1Password to forked JVMs (tests, bootRun)
// Strategy per secret:
// 1) If env VAR is present (local or CI), use it
// 2) If not present and NOT CI, try to read from 1Password via `op read <ref>`
// 3) Otherwise, let Spring fall back to defaults in application.properties
//
// To add more secrets, extend `opSecretMappings` below:
//   "op://vault/item/field" : "SYS_PROPERTY_NAME"
// The property name is also used as the environment variable name.

def isCi = System.getenv('CI') != null

def opSecretMappings = [
    // Example: "op://MyVault/my-item/password": "MY_SERVICE_PASSWORD",
    "op://Kubernetes/openai-bluebubbles-chatgpt-agent-api-key/litellm-api-key": "OPENAI_API_KEY",
    "op://Kubernetes/openai-bluebubbles-chatgpt-agent-api-key/base-url":"OPENAI_BASE_URL",
    "op://Kubernetes/BlueBubbles/password": "BLUEBUBBLES_PASSWORD",
    "op://Kubernetes/BlueBubbles/host": "BLUEBUBBLES_PATH",
    "op://Kubernetes/mem0-api-key/password": "MEM0_API_KEY",
    "op://Kubernetes/mem0-api-key/project-id": "MEM0_PROJECT_ID",
    "op://Kubernetes/mem0-api-key/org-id": "MEM0_ORG_ID",
    "op://Kubernetes/giphy-api-key/password": "GIPHY_API_KEY",
    "op://Kubernetes/gcal-oauth-state-secret/password": "GCAL_OAUTH_STATE_SECRET",
    "op://Kubernetes/gcal-mcp-server/client_secret_552753055766-0fnkjtl0ug4i39hhrr0q9jk49648akra.apps.googleusercontent.com.json": "GCAL_OAUTH_CLIENT_CREDENTIALS_JSON_TEXT",
    "op://Kubernetes/stripe-bbagent-subscriptions-test/api-key": "STRIPE_API_KEY",
    "op://Kubernetes/stripe-bbagent-subscriptions-test/webhook-secret": "STRIPE_WEBHOOK_SECRET",
    "op://Kubernetes/stripe-bbagent-subscriptions-test/premium-product-id": "STRIPE_PRODUCT_ID",
    "op://Kubernetes/stripe-bbagent-subscriptions-test/premium-price-id": "STRIPE_PRICE_ID",
    "op://Kubernetes/stripe-bbagent-subscriptions-test/test-mode-only": "STRIPE_TEST_MODE_ONLY",
    "op://Kubernetes/apple-bbagent-subscriptions/app-id": "APPLE_APP_ID",
    "op://Kubernetes/apple-bbagent-subscriptions/root-certificates-pem": "APPLE_ROOT_CERTIFICATES_PEM",
    "op://Kubernetes/apple-bbagent-subscriptions/premium-product-id": "APPLE_SUBSCRIPTION_PREMIUM_PRODUCT_ID",
    "op://Kubernetes/cap-bbagent-contact/site-key": "CAP_CONTACT_SITE_KEY",
    "op://Kubernetes/cap-bbagent-contact/secret-key": "CAP_CONTACT_SECRET_KEY",
    "op://Kubernetes/linear-bbagent/api-key": "LINEAR_API_KEY",
    "op://Kubernetes/linear-bbagent/team-id": "LINEAR_TEAM_ID"
]

def resolveSecret = { String propName, String opRef ->
    def fromEnv = System.getenv(propName)
    if (fromEnv && fromEnv.trim()) {
        println "🔑 Using ${propName} from environment${isCi ? ' (CI)' : ''}"
        return fromEnv.trim()
    }
    if (isCi) {
        println "ℹ️ CI detected and no ${propName} in env; will rely on application fallback"
        return null
    }
    try {
        def cmd = "op read ${opRef}"
        def proc = ["bash", "-c", cmd].execute()
        def out = new StringBuffer()
        def err = new StringBuffer()
        proc.consumeProcessOutput(out, err)
        proc.waitFor()
        def value = out.toString().trim()
        if (proc.exitValue() == 0 && value) {
            println "🔑 Loaded ${propName} from 1Password (${opRef})"
            return value
        } else {
            println "⚠️ Failed to read ${propName} from 1Password (${opRef}); exit=${proc.exitValue()} stderr=${err.toString().trim()}"
            return null
        }
    } catch (Exception e) {
        println "⚠️ Could not load ${propName} from 1Password: ${e.message}"
        return null
    }
}

def resolveAllSecrets = {
    def result = [:]
    opSecretMappings.each { opRef, propName ->
        def v = resolveSecret(propName, opRef)
        if (v) {
            result[propName] = v
        } else {
            // log a gentle note so users know fallback will apply
            println "ℹ️ No value available for ${propName}; application may use its configured default"
        }
    }
    return result
}

// Inject into all Test tasks
tasks.withType(Test).configureEach {
    doFirst {
        def secrets = resolveAllSecrets()
        if (!secrets.isEmpty()) {
            secrets.each { propName, value ->
                // make available to Spring via both system properties and env var
                systemProperty propName, value
                environment propName, value
                println "🔑 ${propName} injected into test task ${name}"
            }
        }
    }
}

// Also inject into bootRun (local app run)
tasks.matching { it.name == 'bootRun' }.configureEach {
    doFirst {
        def secrets = resolveAllSecrets()
        if (!secrets.isEmpty()) {
            secrets.each { propName, value ->
                systemProperty propName, value
                environment propName, value
                println "🔑 ${propName} injected into bootRun"
            }
        }
    }
}

