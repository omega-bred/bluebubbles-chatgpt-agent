def npmPath = System.getenv('NPM_PATH') ?: ['bash', 'zsh']
        .collect { shell ->
            try {
                def proc = ["${shell}", "-c", "which npm"].execute()
                def output = proc.text.trim()
                proc.waitFor()
                return (proc.exitValue() == 0 && output) ? output : null
            } catch (ignored) {
                null
            }
        }
        .find { it } ?: "${System.getProperty('user.home')}/.nvm/versions/node/v24.6.0/bin/npm"

def isTruthy = { value ->
    value != null && ['1', 'true', 'yes', 'on'].contains(value.toString().toLowerCase(Locale.ROOT))
}

def useNixNodeModules = isTruthy(System.getenv('BBAGENT_USE_NIX_NODE_MODULES')) ||
        isTruthy(findProperty('bbagent.useNixNodeModules'))

def requireNodeModules = { String path ->
    if (useNixNodeModules && !file(path).exists()) {
        throw new GradleException("BBAGENT_USE_NIX_NODE_MODULES is enabled but ${path} does not exist")
    }
}

