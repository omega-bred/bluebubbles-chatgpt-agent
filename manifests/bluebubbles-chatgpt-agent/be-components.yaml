apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: bluebubbles-chatgpt-agent
  name: bluebubbles-chatgpt-agent
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: bluebubbles-chatgpt-agent
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: bluebubbles-chatgpt-agent
    spec:
      enableServiceLinks: false
      serviceAccountName: bluebubbles-chatgpt-agent
      containers:
        - name: bluebubbles-chatgpt-agent
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: INFLUX_DB_TOKEN
              valueFrom:
                secretKeyRef:
                  key: password
                  name: bluebubbles-chatgpt-agent-influx-token
            - name: INFLUX_DB_URI
              value: "https://influxdb-1.taild1b69.ts.net"
            - name: "OPENAI_BASE_URL"
              valueFrom:
                secretKeyRef:
                  key: "base-url"
                  name: openai-bluebubbles-chatgpt-agent-api-key
            - name: "OPENAI_API_KEY"
              valueFrom:
                secretKeyRef:
                  key: "litellm-api-key"
                  name: openai-bluebubbles-chatgpt-agent-api-key
            - name: BBAGENT_LOCAL_RESPONSES_MODEL
              value: "Qwen/Qwen3.6-27B"
            - name: BBAGENT_CHATGPT_RESPONSES_MODEL
              value: "openai/gpt-5.4"
            - name: BBAGENT_CLAUDE_RESPONSES_MODEL
              value: "anthropic/claude-sonnet-4-6"
            - name: BBAGENT_GEMINI_RESPONSES_MODEL
              value: "gemini/gemini-3.5-flash"
            - name: "BLUEBUBBLES_PATH"
              valueFrom:
                secretKeyRef:
                  key: "host"
                  name: bluebubbles
            - name: "BLUEBUBBLES_PASSWORD"
              valueFrom:
                secretKeyRef:
                  key: "password"
                  name: bluebubbles
            - name: BLUEBUBBLES_REQUEST_TIMEOUT_SECONDS
              value: "60"
            - name: LXMF_BRIDGE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  key: "password"
                  name: lxmf-bridge-webhook-secret
            - name: LXMF_BRIDGE_BASE_URL
              value: "http://lxmf-bridge.bluebubbles-chatgpt-agent.svc.cluster.local:8091"
            - name: BBAGENT_CANARY_MARKER
              value: "BBAGENT_LXMF_CANARY_V1"
            - name: BBAGENT_CANARY_LABEL
              value: "lxmf-free-tier"
            - name: BBAGENT_CANARY_CLEANUP_MAX_AGE
              value: "PT24H"
            - name: "MEM0_API_KEY"
              valueFrom:
                secretKeyRef:
                  key: "password"
                  name: mem0-api-key
            - name: "MEM0_ORG_ID"
              valueFrom:
                secretKeyRef:
                  key: "org-id"
                  name: mem0-api-key
            - name: "MEM0_PROJECT_ID"
              valueFrom:
                secretKeyRef:
                  key: "project-id"
                  name: mem0-api-key
            - name: POSTGRES_JDBC_URL
              value: "jdbc:postgresql://bb-chatgpt-agent-db-2.bluebubbles-chatgpt-agent.svc.cluster.local:5432/bb_chatgpt_agent?sslmode=require"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bb-chatgpt-agent-admin.bb-chatgpt-agent-db-2.credentials.postgresql.acid.zalan.do
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bb-chatgpt-agent-admin.bb-chatgpt-agent-db-2.credentials.postgresql.acid.zalan.do
                  key: password
            - name: "GIPHY_API_KEY"
              valueFrom:
                secretKeyRef:
                  key: "password"
                  name: giphy-api-key
            - name: "GCAL_OAUTH_CLIENT_SECRET_PATH"
              value: "/var/run/secrets/gcal/client_secret_552753055766-0fnkjtl0ug4i39hhrr0q9jk49648akra.apps.googleusercontent.com.json"
            - name: GCAL_OAUTH_REDIRECT_URI
              value: "https://bluechat.bre.land/api/v1/gcal/completeOauth.gcal"
            - name: GCAL_OAUTH_STATE_SECRET
              valueFrom:
                secretKeyRef:
                  key: "password"
                  name: gcal-oauth-state-secret
            - name: WEBSITE_BASE_URL
              value: "https://bluechat.bre.land"
            - name: UMAMI_ANALYTICS_ENABLED
              value: "true"
            - name: UMAMI_HOST_URL
              value: "https://unami.bre.land"
            - name: UMAMI_WEBSITE_ID
              value: "944a19b7-0e55-4a9b-b67f-48503cbead0d"
            - name: UMAMI_HOSTNAME
              value: "bluechat.bre.land"
            - name: CAP_BASE_URL
              value: "https://cap.bre.land"
            - name: CAP_CONTACT_REQUIRED
              value: "true"
            - name: CAP_CONTACT_SITE_KEY
              valueFrom:
                secretKeyRef:
                  key: "site-key"
                  name: cap-bbagent-contact
                  optional: true
            - name: CAP_CONTACT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: "secret-key"
                  name: cap-bbagent-contact
                  optional: true
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  key: "api-key"
                  name: linear-bbagent
                  optional: true
            - name: LINEAR_TEAM_ID
              valueFrom:
                secretKeyRef:
                  key: "team-id"
                  name: linear-bbagent
                  optional: true
            - name: LINEAR_TEAM_NAME
              value: "bluechat"
            - name: LINEAR_CONTACT_LABEL
              value: "Contact/Help"
            - name: LINEAR_FEEDBACK_LABEL
              value: "Improvement"
            - name: KEYCLOAK_ISSUER_URI
              value: "https://keycloak.bre.land/realms/bbagent"
            - name: KEYCLOAK_JWK_SET_URI
              value: "https://keycloak.bre.land/realms/bbagent/protocol/openid-connect/certs"
            - name: SUBSCRIPTIONS_DEFAULT_PROVIDER
              value: "stripe"
            - name: SUBSCRIPTION_PREMIUM_PRICE_AMOUNT
              value: "5.00"
            - name: SUBSCRIPTION_PREMIUM_TRIAL_DURATION_DAYS
              value: "30"
            - name: BTCPAY_BASE_URL
              value: "https://btcpay.bre.land"
            - name: BTCPAY_SUBSCRIPTION_PREMIUM_PRICE_AMOUNT
              value: "4.00"
            - name: BTCPAY_STORE_ID
              valueFrom:
                secretKeyRef:
                  key: "store-id"
                  name: btcpay-bbagent-subscriptions
            - name: BTCPAY_API_KEY
              valueFrom:
                secretKeyRef:
                  key: "api-key"
                  name: btcpay-bbagent-subscriptions
            - name: BTCPAY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  key: "webhook-secret"
                  name: btcpay-bbagent-subscriptions
            - name: BTCPAY_SUBSCRIPTION_OFFERING_ID
              valueFrom:
                secretKeyRef:
                  key: "offering-id"
                  name: btcpay-bbagent-subscriptions
            - name: BTCPAY_SUBSCRIPTION_PLAN_ID
              valueFrom:
                secretKeyRef:
                  key: "premium-plan-id"
                  name: btcpay-bbagent-subscriptions
            - name: STRIPE_TEST_MODE_ONLY
              valueFrom:
                secretKeyRef:
                  key: "test-mode-only"
                  name: stripe-bbagent-subscriptions-live
                  optional: true
            - name: STRIPE_SUBSCRIPTION_PREMIUM_PRICE_AMOUNT
              value: "5.00"
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  key: "api-key"
                  name: stripe-bbagent-subscriptions-live
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  key: "webhook-secret"
                  name: stripe-bbagent-subscriptions-live
                  optional: true
            - name: STRIPE_PRODUCT_ID
              valueFrom:
                secretKeyRef:
                  key: "premium-product-id"
                  name: stripe-bbagent-subscriptions-live
                  optional: true
            - name: STRIPE_PRICE_ID
              valueFrom:
                secretKeyRef:
                  key: "premium-price-id"
                  name: stripe-bbagent-subscriptions-live
                  optional: true
          image: ghcr.io/omega-bred/bluebubbles-chatgpt-agent:latest
          imagePullPolicy: Always
          securityContext:
            privileged: false
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            limits:
              cpu: 2048m
              memory: 2048Mi
            requests:
              cpu: 512m
              memory: 512Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - name: gcal-client-secret
              mountPath: /var/run/secrets/gcal
              readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        - name: gcal-client-secret
          secret:
            secretName: gcal-mcp-server
#      nodeSelector:
#        topology.kubernetes.io/zone: "3646"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lxmf-bridge-pvc
  namespace: bluebubbles-chatgpt-agent
spec:
  storageClassName: freenas-iscsi-csi-3646
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: lxmf-bridge
  name: lxmf-bridge
  namespace: bluebubbles-chatgpt-agent
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: lxmf-bridge
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: lxmf-bridge
    spec:
      enableServiceLinks: false
      containers:
        - name: lxmf-bridge
          env:
            - name: LXMF_BRIDGE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  key: "password"
                  name: lxmf-bridge-webhook-secret
            - name: LXMF_BRIDGE_LISTEN_PORT
              value: "8091"
            - name: AGENT_BASE_URL
              value: "http://bluebubbles-chatgpt-agent.bluebubbles-chatgpt-agent.svc.cluster.local"
            - name: RNS_BACKBONE_REMOTE
              value: "rnode-public.rnode.svc.cluster.local"
            - name: RNS_BACKBONE_PORT
              value: "4242"
            - name: LXMF_DISPLAY_NAME
              value: "BlueChat"
          image: ghcr.io/omega-bred/bluebubbles-chatgpt-agent-lxmf-bridge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            limits:
              cpu: 512m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: lxmf-bridge-storage
              mountPath: /var/lib/lxmf-bridge
      volumes:
        - name: lxmf-bridge-storage
          persistentVolumeClaim:
            claimName: lxmf-bridge-pvc
---
kind: Service
apiVersion: v1
metadata:
  name: lxmf-bridge
  namespace: bluebubbles-chatgpt-agent
  labels:
    app: lxmf-bridge
spec:
  ports:
    - name: http
      protocol: TCP
      port: 8091
      targetPort: 8091
  selector:
    app: lxmf-bridge
  type: ClusterIP
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: lxmf-free-tier-canary
  namespace: bluebubbles-chatgpt-agent
  labels:
    app: lxmf-free-tier-canary
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 420
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: lxmf-free-tier-canary
        spec:
          enableServiceLinks: false
          restartPolicy: Never
          containers:
            - name: lxmf-free-tier-canary
              image: ghcr.io/omega-bred/bluebubbles-chatgpt-agent-lxmf-bridge:latest
              imagePullPolicy: Always
              command:
                - python
                - /app/canary.py
              env:
                - name: CANARY_MARKER
                  value: "BBAGENT_LXMF_CANARY_V1"
                - name: CANARY_DISPLAY_NAME
                  value: "BlueChat Canary"
                - name: LXMF_BRIDGE_BASE_URL
                  value: "http://lxmf-bridge.bluebubbles-chatgpt-agent.svc.cluster.local:8091"
                - name: RNS_BACKBONE_REMOTE
                  value: "rnode-public.rnode.svc.cluster.local"
                - name: RNS_BACKBONE_PORT
                  value: "4242"
                - name: CANARY_TIMEOUT_SECONDS
                  value: "300"
                - name: CANARY_STAGE_TIMEOUT_SECONDS
                  value: "90"
                - name: CANARY_INFLUX_ENABLED
                  value: "true"
                - name: INFLUX_DB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      key: password
                      name: bluebubbles-chatgpt-agent-influx-token
                - name: INFLUX_DB_URI
                  value: "https://influxdb-1.taild1b69.ts.net"
                - name: INFLUX_DB_BUCKET
                  value: "bluebubbles-chatgpt-agent"
                - name: INFLUX_DB_ORG
                  value: "bred"
              resources:
                limits:
                  cpu: 512m
                  memory: 512Mi
                requests:
                  cpu: 100m
                  memory: 128Mi
---
kind: Service
apiVersion: v1
metadata:
  name: bluebubbles-chatgpt-agent
  labels:
    app: bluebubbles-chatgpt-agent
spec:
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  selector:
    app: bluebubbles-chatgpt-agent
  type: LoadBalancer
  sessionAffinity: None
  externalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app: bluebubbles-chatgpt-agent
  name: bluebubbles-chatgpt-agent
spec:
  defaultBackend:
    service:
      name: bluebubbles-chatgpt-agent
      port:
        number: 80
  tls:
    - hosts:
        - bluebubbles-chatgpt-agent
  ingressClassName: tailscale
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-brelandio
  labels:
    app: bluebubbles-chatgpt-agent
  name: bluebubbles-chatgpt-agent-bluechat
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - bluechat.bre.land
      secretName: bluechat-bre-land-cert
  rules:
    - host: bluechat.bre.land
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bluebubbles-chatgpt-agent
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-brelandio
  labels:
    app: bluebubbles-chatgpt-agent
  name: bluebubbles-chatgpt-agent-api-3
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - chatagent.bre.land
      secretName: chatagent-bre-land-cert
  rules:
    - host: chatagent.bre.land
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bluebubbles-chatgpt-agent
                port:
                  number: 80
---
apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: bb-chatgpt-agent-db-2
spec:
  teamId: "bb-chatgpt-agent"
  enableMasterLoadBalancer: true
  volume:
    size: 50Gi
    storageClass: freenas-iscsi-csi-3646
  numberOfInstances: 1
  enableLogicalBackup: true
  logicalBackupSchedule: "5 9 * * *"
  users:
    bb_chatgpt_agent_admin:
      - superuser
      - createdb
  databases:
    bb_chatgpt_agent: bb_chatgpt_agent_admin
  postgresql:
    version: "16"
---
