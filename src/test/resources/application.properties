spring.datasource.url=jdbc:h2:mem:bbagent-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=3

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true

openai.base-url=https://api.openai.com/v1
openai.api-key=${OPENAI_API_KEY:fake_api_key}

mem0.base-url=https://api.mem0.ai
mem0.api-key=${MEM0_API_KEY:fake_mem0_key}
mem0.org-id=${MEM0_ORG_ID:fake_org_id}
mem0.project-id=${MEM0_PROJECT_ID:fake_project_id}

gcal.oauth.client_secret_path=${GCAL_OAUTH_CLIENT_SECRET_PATH:/tmp/creds.json}
gcal.oauth.redirect_uri=${GCAL_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/gcal/completeOauth.gcal}
gcal.oauth.state_secret=${GCAL_OAUTH_STATE_SECRET:fake_secret}
gcal.application_name=iChat
coder.mcp.server_url=${CODER_MCP_SERVER_URL:https://coder.breland.io/api/experimental/mcp/http}
coder.oauth.redirect_uri=${CODER_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/coder/completeOauth.coder}
coder.oauth.state_secret=${CODER_OAUTH_STATE_SECRET:${GCAL_OAUTH_STATE_SECRET:fake_secret}}
coder.oauth.client_id=${CODER_OAUTH_CLIENT_ID:}
coder.oauth.client_secret=${CODER_OAUTH_CLIENT_SECRET:}
coder.oauth.scopes=${CODER_OAUTH_SCOPES:coder:all}
coder.oauth.client_name=${CODER_OAUTH_CLIENT_NAME:BlueBubbles ChatGPT Agent Test}
coder.mcp.request_timeout_seconds=${CODER_MCP_REQUEST_TIMEOUT_SECONDS:5}
coder.mcp.tool_cache_ttl_seconds=${CODER_MCP_TOOL_CACHE_TTL_SECONDS:60}
website.base-url=${WEBSITE_BASE_URL:http://localhost:8080}
website.account-link-token-ttl-minutes=${WEBSITE_ACCOUNT_LINK_TOKEN_TTL_MINUTES:30}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:https://keycloak.bre.land/realms/bbagent}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:https://keycloak.bre.land/realms/bbagent/protocol/openid-connect/certs}
giphy.apiKey=${GIPHY_API_KEY:}
giphy.baseUrl=${GIPHY_BASE_URL:https://api.giphy.com/v1}


bluebubbles.basePath=${BLUEBUBBLES_PATH:http://fake_bluebubbles_host:1234}
bluebubbles.password=${BLUEBUBBLES_PASSWORD:fake_bluebubbles_password}

location.reverse-lookup.nominatim.base-url=${LOCATION_REVERSE_LOOKUP_NOMINATIM_BASE_URL:}
location.reverse-lookup.nominatim.timeout-seconds=${LOCATION_REVERSE_LOOKUP_NOMINATIM_TIMEOUT_SECONDS:1}
location.reverse-lookup.nominatim.zoom=${LOCATION_REVERSE_LOOKUP_NOMINATIM_ZOOM:18}

agent.workflow.mode=${AGENT_WORKFLOW_MODE:inline}
agent.workflow.cadence-domain=${CADENCE_DOMAIN:default}
agent.workflow.cadence-task-list=${CADENCE_TASK_LIST:bbagent-test}
agent.workflow.cadence-host=${CADENCE_HOST:localhost}
agent.workflow.cadence-port=${CADENCE_PORT:7933}
agent.workflow.callback-base-url=${AGENT_WORKFLOW_CALLBACK_BASE_URL:http://localhost:8080}
agent.workflow.callback-default-ttl-hours=${AGENT_WORKFLOW_CALLBACK_DEFAULT_TTL_HOURS:24}
agent.workflow.callback-timestamp-tolerance-seconds=${AGENT_WORKFLOW_CALLBACK_TIMESTAMP_TOLERANCE_SECONDS:300}
