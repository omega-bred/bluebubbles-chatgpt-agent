openapi: 3.1.0
info:
  title: BlueBubbles ChatGPT Agent OpenAPI spec
  description: Agent that bridges ChatGPT and iMessage
  version: 0.0.1
servers:
  - url: http://localhost:8080
tags:
  - name: ping
    description: endpoints related to ping
  - name: bluebubbles
    description: BlueBubbles webhook endpoints
  - name: lxmf
    description: LXMF bridge webhook endpoints
  - name: gcal
    description: Google Calendar OAuth endpoints
  - name: coder
    description: Coder MCP OAuth endpoints
  - name: workflowCallback
    description: Agent workflow callback endpoints
  - name: websiteAccount
    description: Website account management endpoints
paths:

  /api/v1/bluebubbles/messageReceived.message:
    post:
      operationId: bluebubblesMessageReceived
      tags:
        - bluebubbles
      summary: BlueBubbles message webhook
      description: Receives BlueBubbles message webhook payloads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlueBubblesMessageReceivedRequest'
      responses:
        '200':
          description: Message processed
          content:
            application/json:
              schema:
                type: object
  /api/v1/lxmf/receive.messages:
    post:
      operationId: lxmfReceiveMessages
      tags:
        - lxmf
      summary: LXMF bridge message webhook
      description: Receives normalized inbound LXMF messages from the LXMF bridge.
      parameters:
        - name: X-LXMF-Bridge-Secret
          in: header
          description: Shared secret used by the LXMF bridge to authenticate webhook calls.
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LxmfMessageReceivedRequest'
      responses:
        '200':
          description: Message processed
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Missing or invalid bridge secret
          content:
            application/json:
              schema:
                type: object
  /api/v1/ping/get.ping:
    get:
      operationId: ping
      tags:
        - ping
      summary: Pings the server to see if it is alive
      description: Pings the server and replies with some information about the server if it is alive
      responses:
        '200':    # status code
          description: A JSON object about the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
  /api/v1/gcal/completeOauth.gcal:
    get:
      operationId: gcalCompleteOauth
      tags:
        - gcal
      summary: Completes Google Calendar OAuth flow
      description: Handles the OAuth redirect from Google and exchanges the code for tokens.
      parameters:
        - name: code
          in: query
          description: OAuth authorization code from Google
          required: true
          schema:
            type: string
        - name: state
          in: query
          description: Account key used to associate the OAuth session
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OAuth completed
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Missing or invalid parameters
          content:
            text/html:
              schema:
                type: string
        '500':
          description: OAuth exchange failed
          content:
            text/html:
              schema:
                type: string
  /api/v1/coder/completeOauth.coder:
    get:
      operationId: coderCompleteOauth
      tags:
        - coder
      summary: Completes Coder MCP OAuth flow
      description: Handles the OAuth redirect from Coder and exchanges the code for tokens.
      parameters:
        - name: code
          in: query
          description: OAuth authorization code from Coder
          required: false
          schema:
            type: string
        - name: state
          in: query
          description: Signed OAuth state used to associate the Coder login session
          required: false
          schema:
            type: string
        - name: error
          in: query
          description: OAuth error returned by Coder when authorization is denied
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OAuth completed
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Missing, invalid, or denied OAuth parameters
          content:
            text/html:
              schema:
                type: string
        '500':
          description: OAuth exchange failed
          content:
            text/html:
              schema:
                type: string
  /api/v1/workflowCallback/receive.workflowCallbacks:
    post:
      operationId: workflowCallbackReceive
      tags:
        - workflowCallback
      summary: Receives signed async workflow callbacks
      description: Receives Standard Webhooks-compatible callbacks for agent async workflow completion. The request body is verified as raw bytes before JSON parsing; application/json is recommended, and raw JSON posts without a content type are also accepted.
      parameters:
        - name: callback_id
          in: query
          description: Callback identifier generated by the agent.
          required: true
          schema:
            type: string
        - name: webhook-id
          in: header
          description: Standard Webhooks event identifier.
          required: true
          schema:
            type: string
        - name: webhook-timestamp
          in: header
          description: Standard Webhooks Unix timestamp in seconds.
          required: true
          schema:
            type: string
        - name: webhook-signature
          in: header
          description: Standard Webhooks signature list.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowCallbackPayload'
      responses:
        '200':
          description: Callback accepted or already processed
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Missing or malformed callback request
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Unknown callback
          content:
            application/json:
              schema:
                type: object
        '409':
          description: Callback already consumed by another webhook event
          content:
            application/json:
              schema:
                type: object
        '410':
          description: Callback expired
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Callback could not be processed
          content:
            application/json:
              schema:
                type: object
  /api/v1/websiteAccount/get.websiteAccount:
    get:
      operationId: websiteAccountGet
      tags:
        - websiteAccount
      summary: Gets the current website account
      description: Returns the authenticated website account profile and linked iMessage identities.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current website account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebsiteAccountResponse'
        '401':
          description: Authentication required
  /api/v1/websiteAccount/listLinkedAccounts.websiteAccountLinks:
    get:
      operationId: websiteAccountListLinkedAccounts
      tags:
        - websiteAccount
      summary: Lists linked website account integrations
      description: Lists linked iMessage identities and integration status derived from those identities.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Linked account integrations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebsiteLinkedAccountsResponse'
        '401':
          description: Authentication required
  /api/v1/websiteAccount/redeemLink.websiteAccountLinks:
    post:
      operationId: websiteAccountRedeemLink
      tags:
        - websiteAccount
      summary: Redeems an iMessage sender link token
      description: Links the authenticated website account to an iMessage identity using a short-lived single-use token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebsiteAccountRedeemLinkRequest'
      responses:
        '200':
          description: Link redeemed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebsiteAccountRedeemLinkResponse'
        '400':
          description: Missing or invalid token
        '401':
          description: Authentication required
        '404':
          description: Link token not found
        '409':
          description: Link token already redeemed by another account
        '410':
          description: Link token expired
  /api/v1/websiteAccount/deleteLink.websiteAccountLinks:
    delete:
      operationId: websiteAccountDeleteLink
      tags:
        - websiteAccount
      summary: Deletes an iMessage sender link
      description: Unlinks an iMessage identity from the authenticated website account.
      security:
        - bearerAuth: []
      parameters:
        - name: link_id
          in: query
          description: Link identifier to remove.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Link deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebsiteAccountDeleteLinkResponse'
        '401':
          description: Authentication required
        '404':
          description: Link not found


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    WebsiteAccountProfile:
      type: object
      required:
        - subject
      properties:
        subject:
          type: string
        email:
          type: string
          nullable: true
        preferred_username:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    WebsiteAccountLink:
      type: object
      required:
        - link_id
        - account_base
        - coder_account_base
        - gcal_account_base
        - is_group
      properties:
        link_id:
          type: string
        account_base:
          type: string
          description: Stable display identity for the linked iMessage sender.
        coder_account_base:
          type: string
          description: Account base used by Coder tools for this sender.
        gcal_account_base:
          type: string
          description: Account base used by Google Calendar tools for this sender/chat.
        chat_guid:
          type: string
          nullable: true
        sender:
          type: string
          nullable: true
        service:
          type: string
          nullable: true
        is_group:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
    WebsiteAccountResponse:
      type: object
      required:
        - account
        - links
      properties:
        account:
          $ref: '#/components/schemas/WebsiteAccountProfile'
        links:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteAccountLink'
    WebsiteCalendarAccountSummary:
      type: object
      required:
        - account_id
      properties:
        account_id:
          type: string
    WebsiteModelOption:
      type: object
      required:
        - model
        - label
        - provider
        - enabled
      properties:
        model:
          type: string
          description: Stable model option key, such as local, chatgpt, claude, or gemini.
        label:
          type: string
        provider:
          type: string
        enabled:
          type: boolean
          description: Whether this option can currently be used by the model picker.
    WebsiteModelAccessSummary:
      type: object
      required:
        - plan
        - is_premium
        - current_model
        - current_model_label
        - model_selection_allowed
        - model_selection_configurable
        - available_models
      properties:
        account_base:
          type: string
          nullable: true
          description: Sender/account base used by the model picker.
        plan:
          type: string
          enum:
            - standard
            - premium
        is_premium:
          type: boolean
        current_model:
          type: string
          description: Read-only current model key exposed to the website.
        current_model_label:
          type: string
        model_selection_allowed:
          type: boolean
          description: Whether this plan is allowed to choose models once model selection is enabled.
        model_selection_configurable:
          type: boolean
          description: Whether model selection can currently be changed from the website.
        read_only_reason:
          type: string
          nullable: true
        available_models:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteModelOption'
    WebsiteIntegrationSummary:
      type: object
      required:
        - link
        - coder_linked
        - gcal_accounts
        - model_access
      properties:
        link:
          $ref: '#/components/schemas/WebsiteAccountLink'
        coder_linked:
          type: boolean
        gcal_accounts:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteCalendarAccountSummary'
        model_access:
          $ref: '#/components/schemas/WebsiteModelAccessSummary'
    WebsiteLinkedAccountsResponse:
      type: object
      required:
        - account
        - integrations
      properties:
        account:
          $ref: '#/components/schemas/WebsiteAccountProfile'
        integrations:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteIntegrationSummary'
    WebsiteAccountRedeemLinkRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    WebsiteAccountRedeemLinkResponse:
      type: object
      required:
        - status
        - link
      properties:
        status:
          type: string
        link:
          $ref: '#/components/schemas/WebsiteAccountLink'
    WebsiteAccountDeleteLinkResponse:
      type: object
      required:
        - deleted
      properties:
        deleted:
          type: boolean
    WorkflowCallbackPayload:
      type: object
      required:
        - type
        - timestamp
        - data
      properties:
        type:
          type: string
          description: Event type, such as agent.async_task.completed or agent.async_task.failed.
        timestamp:
          type: string
          format: date-time
          description: Time the callback event occurred.
        data:
          type: object
          description: Thin callback data with status, summary, IDs, links, artifacts, or errors.
          additionalProperties: true
      additionalProperties: true
    LxmfMessageReceivedRequest:
      type: object
      required:
        - message_id
        - source_hash
        - content
      properties:
        message_id:
          type: string
          description: Stable LXMF message identifier from the bridge.
        source_hash:
          type: string
          description: Hex destination hash of the sender.
        destination_hash:
          type: string
          nullable: true
          description: Hex destination hash that received the message.
        title:
          type: string
          nullable: true
        content:
          type: string
        timestamp:
          type: string
          format: date-time
          nullable: true
        fields:
          type: object
          nullable: true
          additionalProperties: true
        signature_validated:
          type: boolean
          nullable: true
        stamp_valid:
          type: boolean
          nullable: true
      additionalProperties: true
    BlueBubblesMessageReceivedRequest:
      type: object
      required:
        - type
        - data
      properties:
        type:
          type: string
          description: Webhook event type.
          enum:
            - new-message
            - updated-message
            - typing-indicator
        data:
          type: object
          description: Incoming message payload.
          required:
            - originalROWID
            - guid
          properties:
            originalROWID:
              type: integer
            guid:
              type: string
            text:
              type: string
              nullable: true
            attributedBody:
              type: string
              nullable: true
            handle:
              type: object
              required:
                - address
              properties:
                originalROWID:
                  type: integer
                address:
                  type: string
                service:
                  type: string
                uncanonicalizedId:
                  type: string
                  nullable: true
                country:
                  type: string
            handleId:
              type: integer
            otherHandle:
              type: integer
            attachments:
              type: array
              items:
                type: object
                required:
                  - originalROWID
                  - guid
                properties:
                  originalROWID:
                    type: integer
                  guid:
                    type: string
                  uti:
                    type: string
                  mimeType:
                    type: string
                  transferName:
                    type: string
                  totalBytes:
                    type: integer
                  height:
                    type: integer
                  width:
                    type: integer
                  metadata:
                    type: object
                    nullable: true
            subject:
              type: string
              nullable: true
            error:
              type: integer
            dateCreated:
              type: integer
              format: int64
            dateRead:
              type: integer
              nullable: true
              format: int64
            dateDelivered:
              type: integer
              nullable: true
              format: int64
            isDelivered:
              type: boolean
            isFromMe:
              type: boolean
            hasDdResults:
              type: boolean
            isArchived:
              type: boolean
            itemType:
              type: integer
            groupTitle:
              type: string
              nullable: true
            groupActionType:
              type: integer
            balloonBundleId:
              type: string
              nullable: true
            associatedMessageGuid:
              type: string
              nullable: true
            associatedMessageType:
              type: string
              nullable: true
            expressiveSendStyleId:
              type: string
              nullable: true
            threadOriginatorGuid:
              type: string
              nullable: true
            hasPayloadData:
              type: boolean
            chats:
              type: array
              items:
                type: object
                required:
                  - originalROWID
                  - guid
                  - style
                  - chatIdentifier
                  - isArchived
                  - displayName
                properties:
                  originalROWID:
                    type: integer
                  guid:
                    type: string
                  style:
                    type: integer
                  chatIdentifier:
                    type: string
                  isArchived:
                    type: boolean
                  displayName:
                    type: string
            messageSummaryInfo:
              type: object
              nullable: true
            payloadData:
              type: object
              nullable: true
            dateEdited:
              type: integer
              nullable: true
            dateRetracted:
              type: integer
              nullable: true
            partCount:
              type: integer
            tempGuid:
              type: string
              nullable: true
    ErrorModel:
      type: object
      required:
        - message
        - code
      properties:
        message:
          type: string
        code:
          type: integer
          minimum: 100
          maximum: 600
    PingResponse:
      type: object
      properties:
        reply:
          type: string
        timestamp:
          type: string
          format: date-time
