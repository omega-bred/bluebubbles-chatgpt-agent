openapi: 3.1.0
info:
  title: BlueChat OpenAPI spec
  description: Agent that bridges AI models and BlueChat
  version: 0.0.1
servers:
  - url: http://localhost:8080
tags:
  - name: ping
    description: endpoints related to ping
  - name: bluebubbles
    description: BlueBubbles webhook endpoints
  - name: lxmf
    description: LXMF bridge webhook endpoints
  - name: gcal
    description: Google Calendar OAuth endpoints
  - name: websiteAccount
    description: Website account management endpoints
  - name: contact
    description: Public help and contact endpoints
  - name: subscription
    description: Payment subscription and billing endpoints
  - name: texting
    description: Public BlueChat texting discovery endpoints
  - name: nativeApp
    description: Native iOS app session and launch endpoints
  - name: appClip
    description: iOS App Clip session and bootstrap endpoints
  - name: conversationSettings
    description: Conversation-scoped assistant settings endpoints
  - name: admin
    description: Admin-only operational endpoints
paths:

  /api/v1/bluebubbles/messageReceived.message:
    post:
      operationId: bluebubblesMessageReceived
      tags:
        - bluebubbles
      summary: BlueBubbles message webhook
      description: Receives BlueBubbles message webhook payloads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlueBubblesMessageReceivedRequest'
      responses:
        '200':
          description: Message processed
          content:
            application/json:
              schema:
                type: object
  /api/v1/lxmf/receive.messages:
    post:
      operationId: lxmfReceiveMessages
      tags:
        - lxmf
      summary: LXMF bridge message webhook
      description: Receives normalized inbound LXMF messages from the LXMF bridge.
      parameters:
        - name: X-LXMF-Bridge-Secret
          in: header
          description: Shared secret used by the LXMF bridge to authenticate webhook calls.
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LxmfMessageReceivedRequest'
      responses:
        '200':
          description: Message processed
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Missing or invalid bridge secret
          content:
            application/json:
              schema:
                type: object
  /api/v1/ping/get.ping:
    get:
      operationId: ping
      tags:
        - ping
      summary: Pings the server to see if it is alive
      description: Pings the server and replies with some information about the server if it is alive
      responses:
        '200':    # status code
          description: A JSON object about the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
  /api/v1/texting/get.textingNumber:
    get:
      operationId: textingGetNumber
      tags:
        - texting
      summary: Gets the public BlueChat texting number
      description: Returns the current phone number and default message users should text to start BlueChat.
      responses:
        '200':
          description: Current texting number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextingNumberResponse'
        '429':
          description: Too many requests
  /api/v1/gcal/completeOauth.gcal:
    get:
      operationId: gcalCompleteOauth
      tags:
        - gcal
      summary: Completes Google Calendar OAuth flow
      description: Handles the OAuth redirect from Google and exchanges the code for tokens.
      parameters:
        - name: code
          in: query
          description: OAuth authorization code from Google
          required: false
          schema:
            type: string
        - name: state
          in: query
          description: Account key used to associate the OAuth session
          required: false
          schema:
            type: string
        - name: error
          in: query
          description: OAuth error returned by Google when authorization is denied
          required: false
          schema:
            type: string
      responses:
        '303':
          description: Browser redirected to the frontend OAuth result page
          headers:
            Location:
              description: Frontend OAuth result URL
              schema:
                type: string
                format: uri-reference
  /api/v1/websiteAccount/get.websiteAccount:
    get:
      operationId: websiteAccountGet
      tags:
        - websiteAccount
      summary: Gets the current website account
      description: Returns the authenticated website account profile and linked BlueChat identities.
      security:
        - bearerAuth: []
        - appClipSessionAuth: []
      responses:
        '200':
          description: Current website account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebsiteAccountResponse'
        '401':
          description: Authentication required
  /api/v1/websiteAccount/listLinkedAccounts.websiteAccountLinks:
    get:
      operationId: websiteAccountListLinkedAccounts
      tags:
        - websiteAccount
      summary: Lists linked website account integrations
      description: Lists linked BlueChat identities and integration status derived from those identities.
      security:
        - bearerAuth: []
        - appClipSessionAuth: []
      responses:
        '200':
          description: Linked account integrations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebsiteLinkedAccountsResponse'
        '401':
          description: Authentication required
  /api/v1/websiteAccount/redeemLink.websiteAccountLinks:
    post:
      operationId: websiteAccountRedeemLink
      tags:
        - websiteAccount
      summary: Redeems a BlueChat sender link token
      description: Links the authenticated website account to a BlueChat identity using a short-lived single-use token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebsiteAccountRedeemLinkRequest'
      responses:
        '200':
          description: Link redeemed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebsiteAccountRedeemLinkResponse'
        '400':
          description: Missing or invalid token
        '401':
          description: Authentication required
        '404':
          description: Link token not found
        '409':
          description: Link token already redeemed by another account
        '410':
          description: Link token expired
  /api/v1/websiteAccount/deleteLinkedAccount.websiteAccountLinks:
    delete:
      operationId: websiteAccountDeleteLinkedAccount
      tags:
        - websiteAccount
      summary: Deletes a linked integration account
      description: Unlinks an integration account derived from a linked BlueChat identity.
      security:
        - bearerAuth: []
        - appClipSessionAuth: []
      parameters:
        - name: type
          in: query
          description: Integration account type to unlink.
          required: true
          schema:
            type: string
            enum:
              - gcal
        - name: account_key
          in: query
          description: Integration account key to remove.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Linked integration account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebsiteAccountDeleteLinkedAccountResponse'
        '401':
          description: Authentication required
        '404':
          description: Linked integration account not found
  /api/v1/appClip/createSession.appClipSessions:
    post:
      operationId: appClipCreateSession
      tags:
        - appClip
      summary: Creates an App Clip session from a texted link token
      description: Exchanges a short-lived account-link or conversation-settings token for an App Clip session token scoped to the linked BlueChat account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppClipCreateSessionRequest'
      responses:
        '200':
          description: App Clip session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppClipSessionResponse'
        '400':
          description: Missing or invalid link token
        '404':
          description: Link token not found
        '410':
          description: Link token expired
  /api/v1/appClip/get.appClipSession:
    get:
      operationId: appClipGetSession
      tags:
        - appClip
      summary: Gets App Clip bootstrap data
      description: Returns account, subscription summary, and conversation settings data for a valid App Clip session.
      security:
        - appClipSessionAuth: []
      responses:
        '200':
          description: Current App Clip session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppClipSessionResponse'
        '401':
          description: Missing or invalid App Clip session
  /api/v1/appClip/createEvent.appClipEvents:
    post:
      operationId: appClipCreateEvent
      tags:
        - appClip
      summary: Records a high-level App Clip analytics event
      description: Records privacy-safe App Clip product events through the server-side analytics pipeline.
      security:
        - appClipSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppClipEventRequest'
      responses:
        '200':
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppClipEventResponse'
        '400':
          description: Missing or invalid event
        '401':
          description: Missing or invalid App Clip session
  /api/v1/appClip/createBootstrapEvent.appClipEvents:
    post:
      operationId: appClipCreateBootstrapEvent
      tags:
        - appClip
      summary: Records a pre-session App Clip bootstrap event
      description: Records privacy-safe App Clip bootstrap diagnostics before a session token exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppClipEventRequest'
      responses:
        '200':
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppClipEventResponse'
        '400':
          description: Missing or invalid event
  /api/v1/nativeApp/createSession.nativeAppSessions:
    post:
      operationId: nativeAppCreateSession
      tags:
        - nativeApp
      summary: Creates a native iOS app session
      description: Creates an anonymous native app account session, StoreKit appAccountToken, and prefilled starter text.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NativeAppSessionCreateRequest'
      responses:
        '200':
          description: Native app session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeAppSessionResponse'
  /api/v1/nativeApp/get.nativeAppSession:
    get:
      operationId: nativeAppGetSession
      tags:
        - nativeApp
      summary: Gets native iOS app session data
      description: Returns subscription state, StoreKit product IDs, and a fresh prefilled starter text for a valid native app session.
      security:
        - nativeAppSessionAuth: []
      responses:
        '200':
          description: Current native app session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeAppSessionResponse'
        '401':
          description: Missing or invalid native app session
  /api/v1/conversationSettings/get.conversationSettings:
    get:
      operationId: conversationSettingsGet
      tags:
        - conversationSettings
      summary: Gets conversation settings for an App Clip/web settings session
      description: Returns conversation metadata and the current chat-scoped assistant responsiveness setting.
      security:
        - appClipSessionAuth: []
      responses:
        '200':
          description: Conversation settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationSettingsResponse'
        '401':
          description: Missing or invalid session
        '403':
          description: Conversation settings session required
  /api/v1/conversationSettings/updateResponsiveness.conversationSettings:
    post:
      operationId: conversationSettingsUpdateResponsiveness
      tags:
        - conversationSettings
      summary: Updates chat-scoped assistant responsiveness
      description: Updates the existing conversation-scoped assistant responsiveness setting used by the BlueChat agent.
      security:
        - appClipSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationSettingsUpdateRequest'
      responses:
        '200':
          description: Conversation responsiveness updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationSettingsUpdateResponse'
        '400':
          description: Missing or invalid responsiveness
        '401':
          description: Missing or invalid session
        '403':
          description: Conversation settings session required
  /api/v1/websiteAccount/updateModel.websiteAccountModels:
    post:
      operationId: websiteAccountUpdateModel
      tags:
        - websiteAccount
      summary: Updates assistant model preferences
      description: Lets premium accounts choose the assistant model used by linked chat identities.
      security:
        - bearerAuth: []
        - appClipSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebsiteModelSelectionRequest'
      responses:
        '200':
          description: Assistant model preferences updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebsiteModelSelectionResponse'
        '400':
          description: Unknown or unavailable preference
        '401':
          description: Authentication required
        '403':
          description: Premium account required
        '404':
          description: Account not found
  /api/v1/contact/get.contactConfig:
    get:
      operationId: contactGetConfig
      tags:
        - contact
      summary: Gets public contact form configuration
      description: Returns the public contact form configuration, including the Cap widget endpoint when contact CAPTCHA is configured.
      responses:
        '200':
          description: Contact form configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactConfigResponse'
  /api/v1/contact/create.contactMessages:
    post:
      operationId: contactCreateMessage
      tags:
        - contact
      summary: Creates a public contact message
      description: Verifies the Cap token and creates a Linear help/contact issue for admin review. If a valid bearer token is provided, the created issue includes the authenticated website account id.
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactMessageRequest'
      responses:
        '200':
          description: Contact message accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactMessageResponse'
        '400':
          description: Missing fields or invalid Cap token
        '503':
          description: Contact form or Cap verification is not configured
  /api/v1/subscription/list.subscriptionPlans:
    get:
      operationId: subscriptionListPlans
      tags:
        - subscription
      summary: Lists available subscription plans
      description: Lists active billing plans and the default subscription provider.
      responses:
        '200':
          description: Available subscription plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPlansResponse'
  /api/v1/subscription/get.subscription:
    get:
      operationId: subscriptionGet
      tags:
        - subscription
      summary: Gets current subscription status
      description: Returns billing and entitlement state for the authenticated website account.
      security:
        - bearerAuth: []
        - appClipSessionAuth: []
      responses:
        '200':
          description: Current subscription status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionSummaryResponse'
        '401':
          description: Authentication required
  /api/v1/subscription/createCheckout.subscriptionCheckouts:
    post:
      operationId: subscriptionCreateCheckout
      tags:
        - subscription
      summary: Creates a subscription checkout session
      description: Creates a provider checkout session for the authenticated website account.
      security:
        - bearerAuth: []
        - appClipSessionAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCheckoutRequest'
      responses:
        '200':
          description: Checkout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCheckoutResponse'
        '400':
          description: Invalid checkout request
        '401':
          description: Authentication required
  /api/v1/subscription/createPortal.subscriptionPortals:
    post:
      operationId: subscriptionCreatePortal
      tags:
        - subscription
      summary: Creates a subscription management portal session
      description: Creates a provider portal session for the authenticated website account.
      security:
        - bearerAuth: []
        - appClipSessionAuth: []
      responses:
        '200':
          description: Portal session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPortalResponse'
        '401':
          description: Authentication required
        '404':
          description: No subscription found
  /api/v1/subscription/validateStoreKit.subscriptionProviderEvents:
    post:
      operationId: subscriptionValidateStoreKit
      tags:
        - subscription
      summary: Validates a StoreKit transaction
      description: Validates a StoreKit 2 signed transaction for the authenticated account and updates subscription entitlements.
      security:
        - bearerAuth: []
        - nativeAppSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionStoreKitTransactionRequest'
      responses:
        '200':
          description: Transaction validated and subscription state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionSummaryResponse'
        '400':
          description: Invalid StoreKit transaction
        '401':
          description: Authentication required
  /api/v1/subscription/receiveWebhook.subscriptionProviderEvents:
    post:
      operationId: subscriptionReceiveWebhook
      tags:
        - subscription
      summary: Receives payment provider webhook events
      description: Receives raw provider webhook payloads. The provider adapter validates signatures before processing.
      parameters:
        - name: provider
          in: query
          description: Subscription provider key, such as btcpay or stripe.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook processed, ignored, or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionProviderWebhookResponse'
        '401':
          description: Invalid provider webhook signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionProviderWebhookResponse'
  /api/v1/admin/list.subscriptions:
    get:
      operationId: adminListSubscriptions
      tags:
        - admin
      summary: Lists subscription state for admins
      description: Returns payment subscription stats and recent subscription rows.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Subscription admin list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSubscriptionListResponse'
        '401':
          description: Authentication required
        '403':
          description: Admin role required
  /api/v1/admin/sync.subscription:
    post:
      operationId: adminSyncSubscription
      tags:
        - admin
      summary: Syncs one provider subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSubscriptionActionRequest'
      responses:
        '200':
          description: Subscription synced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSubscriptionActionResponse'
        '400':
          description: Invalid request
        '401':
          description: Authentication required
        '403':
          description: Admin role required
        '404':
          description: Subscription not found
  /api/v1/admin/suspend.subscription:
    post:
      operationId: adminSuspendSubscription
      tags:
        - admin
      summary: Suspends one provider subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSubscriptionActionRequest'
      responses:
        '200':
          description: Subscription suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSubscriptionActionResponse'
        '400':
          description: Invalid request
        '401':
          description: Authentication required
        '403':
          description: Admin role required
        '404':
          description: Subscription not found
  /api/v1/admin/unsuspend.subscription:
    post:
      operationId: adminUnsuspendSubscription
      tags:
        - admin
      summary: Unsuspends one provider subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSubscriptionActionRequest'
      responses:
        '200':
          description: Subscription unsuspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSubscriptionActionResponse'
        '400':
          description: Invalid request
        '401':
          description: Authentication required
        '403':
          description: Admin role required
        '404':
          description: Subscription not found
  /api/v1/admin/grantPremium.subscription:
    post:
      operationId: adminGrantPremium
      tags:
        - admin
      summary: Grants manual premium access
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminPremiumGrantRequest'
      responses:
        '200':
          description: Manual premium granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSubscriptionActionResponse'
        '400':
          description: Invalid request
        '401':
          description: Authentication required
        '403':
          description: Admin role required
        '404':
          description: Account not found
  /api/v1/admin/revokePremium.subscription:
    post:
      operationId: adminRevokePremium
      tags:
        - admin
      summary: Revokes manual premium access
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminPremiumGrantRequest'
      responses:
        '200':
          description: Manual premium revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSubscriptionActionResponse'
        '400':
          description: Invalid request
        '401':
          description: Authentication required
        '403':
          description: Admin role required
        '404':
          description: Account not found
  /api/v1/admin/list.accountBlocks:
    get:
      operationId: adminListAccountBlocks
      tags:
        - admin
      summary: Lists blocked agent accounts
      description: Returns recently blocked canonical accounts and their linked identities.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Blocked accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccountBlockListResponse'
        '401':
          description: Authentication required
        '403':
          description: Admin role required
  /api/v1/admin/block.account:
    post:
      operationId: adminBlockAccount
      tags:
        - admin
      summary: Blocks an account from agent processing
      description: Blocks a canonical account resolved by account id, website identity, or transport identity.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAccountBlockRequest'
      responses:
        '200':
          description: Account blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccountBlockResponse'
        '400':
          description: Invalid request
        '401':
          description: Authentication required
        '403':
          description: Admin role required
        '404':
          description: Account not found
  /api/v1/admin/unblock.account:
    post:
      operationId: adminUnblockAccount
      tags:
        - admin
      summary: Unblocks an account for agent processing
      description: Removes the processing block from a canonical account resolved by account id, website identity, or transport identity.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAccountBlockRequest'
      responses:
        '200':
          description: Account unblocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccountBlockResponse'
        '400':
          description: Invalid request
        '401':
          description: Authentication required
        '403':
          description: Admin role required
        '404':
          description: Account not found
  /api/v1/admin/get.statistics:
    get:
      operationId: adminGetStatistics
      tags:
        - admin
      summary: Gets recent agent statistics
      description: Returns message, model, tool, and active-user statistics for an admin-selected time period.
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          description: Inclusive start of the statistics period. Defaults to 24 hours before now.
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Exclusive end of the statistics period. Defaults to now.
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Admin statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatsResponse'
        '400':
          description: Invalid time period
        '401':
          description: Authentication required
        '403':
          description: Admin role required
  /api/v1/admin/get.rate_limit_usage:
    get:
      operationId: adminGetRateLimitUsage
      tags:
        - admin
      summary: Gets current rate-limit usage
      description: Returns current usage for app rate limits, including monthly assistant response usage by account.
      security:
        - bearerAuth: []
      parameters:
        - name: limit_key
          in: query
          description: Rate limit key to inspect. Defaults to monthly assistant response usage.
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of usage rows to return.
          required: false
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Admin rate-limit usage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRateLimitUsageResponse'
        '401':
          description: Authentication required
        '403':
          description: Admin role required
  /api/v1/admin/list.feedback:
    get:
      operationId: adminListFeedback
      tags:
        - admin
      summary: Lists agent feedback
      description: Legacy feedback inbox endpoint. New user feedback is created as Linear issues instead of Postgres rows.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: Feedback read state to list. Defaults to unread.
          required: false
          schema:
            type: string
            enum:
              - all
              - unread
              - read
            default: unread
        - name: limit
          in: query
          description: Maximum number of feedback items to return.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 100
      responses:
        '200':
          description: Feedback inbox items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminFeedbackListResponse'
        '401':
          description: Authentication required
        '403':
          description: Admin role required
  /api/v1/admin/markRead.feedback:
    post:
      operationId: adminMarkFeedbackRead
      tags:
        - admin
      summary: Marks feedback as read
      description: Marks a feedback inbox item as read.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminFeedbackStatusUpdateRequest'
      responses:
        '200':
          description: Feedback item after the update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminFeedbackItem'
        '400':
          description: Missing feedback id
        '401':
          description: Authentication required
        '403':
          description: Admin role required
        '404':
          description: Feedback item not found
  /api/v1/admin/markUnread.feedback:
    post:
      operationId: adminMarkFeedbackUnread
      tags:
        - admin
      summary: Marks feedback as unread
      description: Marks a feedback inbox item as unread.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminFeedbackStatusUpdateRequest'
      responses:
        '200':
          description: Feedback item after the update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminFeedbackItem'
        '400':
          description: Missing feedback id
        '401':
          description: Authentication required
        '403':
          description: Admin role required
        '404':
          description: Feedback item not found


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    appClipSessionAuth:
      type: apiKey
      in: header
      name: X-App-Clip-Session
    nativeAppSessionAuth:
      type: apiKey
      in: header
      name: X-BlueChat-App-Session
  schemas:
    WebsiteAccountProfile:
      type: object
      required:
        - subject
        - account_id
      properties:
        subject:
          type: string
          nullable: true
        account_id:
          type: string
        email:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    WebsiteAccountIdentity:
      type: object
      required:
        - type
        - identifier
        - normalized_identifier
      properties:
        type:
          type: string
          enum:
            - imessage_email
            - imessage_phone
            - lxmf_address
        identifier:
          type: string
        normalized_identifier:
          type: string
    WebsiteAccountLink:
      type: object
      required:
        - link_id
        - account_id
        - identities
      properties:
        link_id:
          type: string
        account_id:
          type: string
          description: Canonical account id shared across chat identities and integrations.
        identities:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteAccountIdentity'
        chat_guid:
          type: string
          nullable: true
        sender:
          type: string
          nullable: true
        service:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
    WebsiteAccountResponse:
      type: object
      required:
        - account
        - links
        - usage_limits
      properties:
        account:
          $ref: '#/components/schemas/WebsiteAccountProfile'
        links:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteAccountLink'
        usage_limits:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteUsageLimitSummary'
    WebsiteCalendarAccountSummary:
      type: object
      required:
        - account_id
        - account_key
      properties:
        account_id:
          type: string
        account_key:
          type: string
        email:
          type: string
          nullable: true
    WebsiteLinkedIntegrationAccount:
      type: object
      required:
        - type
        - account_key
        - label
        - unlinkable
      properties:
        type:
          type: string
          enum:
            - gcal
        account_key:
          type: string
        email:
          type: string
          nullable: true
        label:
          type: string
        unlinkable:
          type: boolean
    WebsiteModelOption:
      type: object
      required:
        - model
        - label
        - provider
        - enabled
      properties:
        model:
          type: string
          description: Stable model option key, such as local, chatgpt, claude, or gemini.
        label:
          type: string
        provider:
          type: string
          description: Model provider key, such as local, chatgpt, claude, or gemini.
        enabled:
          type: boolean
          description: Whether this option can currently be used by the model picker.
    WebsiteModelAccessSummary:
      type: object
      required:
        - is_premium
        - current_model
        - current_model_label
        - model_selection_allowed
        - model_selection_configurable
        - available_models
      properties:
        account_id:
          type: string
          nullable: true
          description: Canonical account id used by the model picker.
        is_premium:
          type: boolean
        current_model:
          type: string
          description: Read-only current model key exposed to the website.
        current_model_label:
          type: string
        model_selection_allowed:
          type: boolean
          description: Whether this account is allowed to choose models once model selection is enabled.
        model_selection_configurable:
          type: boolean
          description: Whether model selection can currently be changed from the website.
        read_only_reason:
          type: string
          nullable: true
        available_models:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteModelOption'
    WebsiteModelSelectionRequest:
      type: object
      required:
        - model
      properties:
        model:
          type: string
          description: Preferred model key for premium accounts.
          enum:
            - chatgpt
            - claude
            - gemini
    WebsiteModelSelectionResponse:
      type: object
      required:
        - model_access
        - message
      properties:
        model_access:
          $ref: '#/components/schemas/WebsiteModelAccessSummary'
        message:
          type: string
    WebsiteIntegrationSummary:
      type: object
      required:
        - link
        - gcal_accounts
        - linked_accounts
        - model_access
      properties:
        link:
          $ref: '#/components/schemas/WebsiteAccountLink'
        gcal_accounts:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteCalendarAccountSummary'
        linked_accounts:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteLinkedIntegrationAccount'
        model_access:
          $ref: '#/components/schemas/WebsiteModelAccessSummary'
    WebsiteLinkedAccountsResponse:
      type: object
      required:
        - account
        - integrations
        - usage_limits
      properties:
        account:
          $ref: '#/components/schemas/WebsiteAccountProfile'
        integrations:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteIntegrationSummary'
        usage_limits:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteUsageLimitSummary'
    WebsiteUsageLimitSummary:
      type: object
      required:
        - limit_key
        - limit_label
        - used
        - limit
        - remaining
        - percentage
        - exhausted
        - window_start
        - window_end
      properties:
        limit_key:
          type: string
          description: Stable app limit key, such as message_responses_per_month.
        limit_label:
          type: string
        used:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        remaining:
          type: integer
          format: int64
        percentage:
          type: number
          format: double
          description: Fraction of the monthly limit used, from 0.0 to 1.0.
        exhausted:
          type: boolean
        window_start:
          type: string
          format: date-time
        window_end:
          type: string
          format: date-time
          description: Reset time for this usage window.
    WebsiteAccountRedeemLinkRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    WebsiteAccountRedeemLinkResponse:
      type: object
      required:
        - status
        - link
      properties:
        status:
          type: string
        link:
          $ref: '#/components/schemas/WebsiteAccountLink'
    WebsiteAccountDeleteLinkedAccountResponse:
      type: object
      required:
        - deleted
      properties:
        deleted:
          type: boolean
    ConversationParticipantSummary:
      type: object
      required:
        - address
      properties:
        address:
          type: string
        country:
          type: string
          nullable: true
    ConversationSummary:
      type: object
      required:
        - chat_guid
        - display_name
        - participants
      properties:
        chat_guid:
          type: string
        display_name:
          type: string
        chat_identifier:
          type: string
          nullable: true
        is_group:
          type: boolean
          nullable: true
        participant_count:
          type: integer
          format: int32
          nullable: true
        participants:
          type: array
          items:
            $ref: '#/components/schemas/ConversationParticipantSummary'
        icon_url:
          type: string
          nullable: true
          description: Conversation icon URL when BlueBubbles exposes one.
    ConversationResponsivenessOption:
      type: object
      required:
        - responsiveness
        - label
        - description
        - enabled
      properties:
        responsiveness:
          type: string
          enum:
            - silent
            - less_responsive
            - default
            - more_responsive
        label:
          type: string
        description:
          type: string
        enabled:
          type: boolean
    ConversationSettingsResponse:
      type: object
      required:
        - conversation
        - current_responsiveness
        - current_responsiveness_label
        - options
      properties:
        conversation:
          $ref: '#/components/schemas/ConversationSummary'
        current_responsiveness:
          type: string
          enum:
            - silent
            - less_responsive
            - default
            - more_responsive
        current_responsiveness_label:
          type: string
        options:
          type: array
          items:
            $ref: '#/components/schemas/ConversationResponsivenessOption'
    ConversationSettingsUpdateRequest:
      type: object
      required:
        - responsiveness
      properties:
        responsiveness:
          type: string
          enum:
            - silent
            - less_responsive
            - default
            - more_responsive
    ConversationSettingsUpdateResponse:
      type: object
      required:
        - settings
        - message
      properties:
        settings:
          $ref: '#/components/schemas/ConversationSettingsResponse'
        message:
          type: string
    TextingNumberResponse:
      type: object
      required:
        - phone_number_e164
        - display_number
        - default_message
        - sms_url
      properties:
        phone_number_e164:
          type: string
          description: E.164 phone number users should text.
        display_number:
          type: string
          description: Human-readable phone number.
        default_message:
          type: string
          description: Suggested message body for starting a BlueChat conversation.
        sms_url:
          type: string
          description: SMS URL with the current phone number and default message.
    NativeAppSessionCreateRequest:
      type: object
      properties:
        source:
          type: string
          nullable: true
          description: Optional launch source label for diagnostics.
    NativeAppSessionResponse:
      type: object
      required:
        - session_token
        - expires_at
        - account_id
        - app_account_token
        - subscription
        - storekit_product_ids
        - texting
      properties:
        session_token:
          type: string
          description: Opaque native app session token. Send as X-BlueChat-App-Session.
        expires_at:
          type: string
          format: date-time
        account_id:
          type: string
          description: Canonical agent account id for this native app session.
        app_account_token:
          type: string
          format: uuid
          description: Deterministic StoreKit appAccountToken for purchases by this account.
        subscription:
          $ref: '#/components/schemas/SubscriptionSummaryResponse'
        storekit_product_ids:
          type: array
          items:
            type: string
          description: StoreKit product IDs the native app should load.
        texting:
          $ref: '#/components/schemas/TextingNumberResponse'
    AppClipCreateSessionRequest:
      type: object
      required:
        - link_token
      properties:
        link_token:
          type: string
          description: Short-lived account-link or conversation-settings token from the App Clip invocation URL.
    AppClipSessionResponse:
      type: object
      required:
        - session_token
        - purpose
        - expires_at
        - account
        - linked_accounts
        - subscription
      properties:
        session_token:
          type: string
          description: Opaque App Clip session token. Send as X-App-Clip-Session.
        purpose:
          type: string
          enum:
            - account_link
            - conversation_settings
        expires_at:
          type: string
          format: date-time
        account:
          $ref: '#/components/schemas/WebsiteAccountProfile'
        linked_accounts:
          $ref: '#/components/schemas/WebsiteLinkedAccountsResponse'
        subscription:
          $ref: '#/components/schemas/SubscriptionSummaryResponse'
        conversation_settings:
          nullable: true
          $ref: '#/components/schemas/ConversationSettingsResponse'
    AppClipEventRequest:
      type: object
      required:
        - event_name
      properties:
        event_name:
          type: string
          description: High-level App Clip event name. Server-side analytics truncates this to Umami limits.
          maxLength: 50
        properties:
          type: object
          nullable: true
          additionalProperties: true
          description: Privacy-safe event properties. Do not include link tokens, session tokens, emails, phone numbers, or message contents.
    AppClipEventResponse:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: boolean
    ContactConfigResponse:
      type: object
      required:
        - enabled
        - captcha_required
        - captcha_configured
      properties:
        enabled:
          type: boolean
        captcha_required:
          type: boolean
        captcha_configured:
          type: boolean
        cap_api_endpoint:
          type: string
          nullable: true
          description: Public Cap widget endpoint, usually https://cap.bre.land/{site-key}/.
    ContactMessageRequest:
      type: object
      required:
        - name
        - email
        - subject
        - message
        - cap_token
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          minLength: 3
          maxLength: 320
        subject:
          type: string
          minLength: 1
          maxLength: 200
        message:
          type: string
          minLength: 1
          maxLength: 5000
        cap_token:
          type: string
          minLength: 1
          description: Token emitted by the Cap widget solve event.
    ContactMessageResponse:
      type: object
      required:
        - status
        - message_id
      properties:
        status:
          type: string
        message_id:
          type: string
          description: Linear issue identifier or ID for the accepted contact request.
    SubscriptionPlan:
      type: object
      required:
        - key
        - display_name
        - price_amount
        - currency
        - billing_interval
        - trial_duration_days
        - provider
        - active
      properties:
        key:
          type: string
        display_name:
          type: string
        description:
          type: string
          nullable: true
        price_amount:
          type: string
          description: Decimal plan price as configured by the app.
        currency:
          type: string
        billing_interval:
          type: string
        trial_duration_days:
          type: integer
          format: int32
          minimum: 0
          description: Number of free trial days applied when checkout creates a subscription.
        provider:
          type: string
          description: Subscription provider key, such as btcpay or stripe.
        active:
          type: boolean
    SubscriptionPlansResponse:
      type: object
      required:
        - default_provider
        - plans
      properties:
        default_provider:
          type: string
        plans:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionPlan'
    SubscriptionCheckoutRequest:
      type: object
      properties:
        plan_key:
          type: string
          nullable: true
        provider:
          type: string
          description: Subscription provider key, such as btcpay or stripe.
          nullable: true
    SubscriptionCheckoutResponse:
      type: object
      required:
        - checkout_session_id
        - provider
        - plan_key
        - checkout_url
      properties:
        checkout_session_id:
          type: string
        provider:
          type: string
          description: Subscription provider key, such as btcpay or stripe.
        plan_key:
          type: string
        checkout_url:
          type: string
          format: uri-reference
        expires_at:
          type: string
          format: date-time
          nullable: true
    SubscriptionPortalResponse:
      type: object
      required:
        - provider
        - portal_url
      properties:
        provider:
          type: string
          description: Subscription provider key, such as btcpay or stripe.
        portal_url:
          type: string
          format: uri-reference
    SubscriptionStoreKitTransactionRequest:
      type: object
      required:
        - signed_transaction_info
      properties:
        signed_transaction_info:
          type: string
          description: StoreKit 2 transaction JWS from Transaction.jwsRepresentation.
        signed_renewal_info:
          type: string
          nullable: true
          description: Optional StoreKit renewal-info JWS when available.
        product_id:
          type: string
          nullable: true
          description: Expected StoreKit product ID.
        transaction_id:
          type: string
          nullable: true
          description: StoreKit transaction identifier observed by the App Clip.
        environment:
          type: string
          nullable: true
          description: StoreKit environment hint, such as Xcode, Sandbox, or Production.
        plan_key:
          type: string
          nullable: true
          description: Internal subscription plan key to apply.
    SubscriptionSummaryResponse:
      type: object
      required:
        - account_id
        - is_premium
        - entitlement_source
        - plans
        - subscriptions
      properties:
        account_id:
          type: string
        is_premium:
          type: boolean
        entitlement_source:
          type: string
        premium_until:
          type: string
          format: date-time
          nullable: true
        plans:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionPlan'
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/AdminSubscriptionItem'
        latest_checkout:
          type: string
          nullable: true
    SubscriptionProviderWebhookResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
        message:
          type: string
          nullable: true
        account_id:
          type: string
          nullable: true
        subscription_id:
          type: string
          nullable: true
    AdminSubscriptionStats:
      type: object
      required:
        - total_subscriptions
        - active_subscriptions
        - past_due_subscriptions
        - inactive_subscriptions
        - monthly_recurring_amount
        - currency
      properties:
        total_subscriptions:
          type: integer
          format: int64
        active_subscriptions:
          type: integer
          format: int64
        past_due_subscriptions:
          type: integer
          format: int64
        inactive_subscriptions:
          type: integer
          format: int64
        monthly_recurring_amount:
          type: string
        currency:
          type: string
    AdminSubscriptionItem:
      type: object
      required:
        - subscription_id
        - account_id
        - provider
        - plan_key
        - status
        - updated_at
      properties:
        subscription_id:
          type: string
        account_id:
          type: string
        account_bucket:
          type: string
          nullable: true
        provider:
          type: string
          description: Subscription provider key, such as btcpay or stripe.
        plan_key:
          type: string
        status:
          type: string
        provider_status:
          type: string
          nullable: true
        provider_subscription_id:
          type: string
          nullable: true
        provider_customer_id:
          type: string
          nullable: true
        current_period_end:
          type: string
          format: date-time
          nullable: true
        grace_period_end:
          type: string
          format: date-time
          nullable: true
        management_url:
          type: string
          nullable: true
        last_synced_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
    AdminSubscriptionListResponse:
      type: object
      required:
        - generated_at
        - stats
        - subscriptions
      properties:
        generated_at:
          type: string
          format: date-time
        stats:
          $ref: '#/components/schemas/AdminSubscriptionStats'
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/AdminSubscriptionItem'
    AdminSubscriptionActionRequest:
      type: object
      required:
        - subscription_id
      properties:
        subscription_id:
          type: string
        reason:
          type: string
          nullable: true
    AdminPremiumGrantRequest:
      type: object
      properties:
        target:
          type: string
          description: Account id, website or BlueChat email, or BlueChat phone number to grant or revoke manual premium access for.
        target_type:
          $ref: '#/components/schemas/AdminPremiumGrantTargetType'
          description: Optional target type. When omitted, the server resolves the target as account id, email, then phone.
        account_id:
          type: string
          nullable: true
          deprecated: true
          description: Deprecated. Use target with target_type account_id instead.
    AdminPremiumGrantTargetType:
      type: string
      enum:
        - account_id
        - email
        - phone
    AdminAccountBlockTargetType:
      type: string
      enum:
        - account_id
        - imessage_email
        - imessage_phone
        - lxmf_address
        - website_subject
        - website_email
    AdminAccountBlockRequest:
      type: object
      required:
        - target
        - target_type
      properties:
        target:
          type: string
          description: Account id or identity value to block or unblock.
        target_type:
          $ref: '#/components/schemas/AdminAccountBlockTargetType'
        reason:
          type: string
          nullable: true
          maxLength: 1000
    AdminBlockedAccountItem:
      type: object
      required:
        - account_id
        - account_bucket
        - blocked
        - identities
      properties:
        account_id:
          type: string
        account_bucket:
          type: string
        blocked:
          type: boolean
        reason:
          type: string
          nullable: true
        blocked_at:
          type: string
          format: date-time
          nullable: true
        blocked_by:
          type: string
          nullable: true
        website_email:
          type: string
          nullable: true
        website_subject:
          type: string
          nullable: true
        identities:
          type: array
          items:
            $ref: '#/components/schemas/WebsiteAccountIdentity'
    AdminAccountBlockListResponse:
      type: object
      required:
        - accounts
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AdminBlockedAccountItem'
    AdminAccountBlockResponse:
      type: object
      required:
        - status
        - account
      properties:
        status:
          type: string
        account:
          $ref: '#/components/schemas/AdminBlockedAccountItem'
    AdminSubscriptionActionResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
        account_id:
          type: string
          nullable: true
        subscription_id:
          type: string
          nullable: true
        subscription:
          $ref: '#/components/schemas/AdminSubscriptionItem'
    AdminStatsPeriod:
      type: object
      required:
        - from
        - to
        - bucket_size
      properties:
        from:
          type: string
          format: date-time
