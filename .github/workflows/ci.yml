name: CI - Test, Build, and Manifest Update

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['**']

permissions:
  contents: write  # needed to push manifest changes
  packages: write  # needed to push container image

jobs:
  test:
    name: Gradle Test
    runs-on: ubuntu-latest
    # Skip workflow on manifest auto-commit
    if: ${{ !(github.event_name == 'push' && contains(github.event.head_commit.message, '[skip ci]')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: CI=true BBAGENT_NIX_SHELL_QUIET=1 nix develop --command ./gradlew test

  ios_appclip_build:
    name: iOS App Clip Build
    runs-on: macos-latest
    if: ${{ !(github.event_name == 'push' && contains(github.event.head_commit.message, '[skip ci]')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Generate Swift OpenAPI client
        run: CI=true BBAGENT_NIX_SHELL_QUIET=1 nix develop --command ./gradlew copySwiftClientToAppClip

      - name: Verify Swift OpenAPI client is current
        run: git diff --exit-code -- appclip/Generated/BlueChatAgentClient

      - name: Build App Clip
        run: |
          xcodebuild \
            -project appclip/BlueChat.xcodeproj \
            -scheme BlueChatClip \
            -hideShellScriptEnvironment \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath appclip/.derivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build Container App
        run: |
          xcodebuild \
            -project appclip/BlueChat.xcodeproj \
            -scheme BlueChat \
            -hideShellScriptEnvironment \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath appclip/.derivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

  build_and_push:
    name: Build and Push Docker Images
    needs:
      - test
      - ios_appclip_build
    # Only build/push on push events (not PRs)
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      APP_IMAGE_NAME: ${{ github.repository }}
      LXMF_BRIDGE_IMAGE_NAME: ${{ github.repository }}-lxmf-bridge
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract app metadata (tags, labels)
        id: app_meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=${{ github.sha }}-${{ github.run_number }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push app image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.app_meta.outputs.tags }}
          labels: ${{ steps.app_meta.outputs.labels }}

      - name: Extract LXMF bridge metadata (tags, labels)
        id: lxmf_bridge_meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.LXMF_BRIDGE_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=${{ github.sha }}-${{ github.run_number }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push LXMF bridge image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ./lxmf-bridge
          push: true
          platforms: linux/amd64
          tags: ${{ steps.lxmf_bridge_meta.outputs.tags }}
          labels: ${{ steps.lxmf_bridge_meta.outputs.labels }}

  update_manifest:
    name: Update Kube Manifest
    needs: build_and_push
    # Only update manifests on pushes to main
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (main)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git user
        run: |
          git config --global user.email "robot@bre.land"
          git config --global user.name "Bre.land Robot"

      - name: Update image in kustomize
        working-directory: manifests/bluebubbles-chatgpt-agent
        env:
          # Set this secret to the image name used in your manifests, e.g. "registry.breland.io/omega-bred/bluebubbles-chatgpt-agent"
          # If not set, it falls back to "ghcr.io/${{ github.repository }}"
          KUSTOMIZE_IMAGE_NAME: ${{ secrets.KUSTOMIZE_IMAGE_NAME }}
          KUSTOMIZE_LXMF_BRIDGE_IMAGE_NAME: ${{ secrets.KUSTOMIZE_LXMF_BRIDGE_IMAGE_NAME }}
          BUILD_SHA: ${{ github.sha }}
          BUILD_RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          IMAGE_NAME="${KUSTOMIZE_IMAGE_NAME:-}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="ghcr.io/${{ github.repository }}"
          fi
          LXMF_BRIDGE_IMAGE_NAME="${KUSTOMIZE_LXMF_BRIDGE_IMAGE_NAME:-}"
          if [ -z "$LXMF_BRIDGE_IMAGE_NAME" ]; then
            LXMF_BRIDGE_IMAGE_NAME="ghcr.io/${{ github.repository }}-lxmf-bridge"
          fi
          NEW_TAG="${BUILD_SHA}-${BUILD_RUN_NUMBER}"
          echo "Setting image ${IMAGE_NAME} to tag ${NEW_TAG}"
          nix develop ../.. --command kustomize edit set image "${IMAGE_NAME}=${IMAGE_NAME}:${NEW_TAG}"
          echo "Setting image ${LXMF_BRIDGE_IMAGE_NAME} to tag ${NEW_TAG}"
          nix develop ../.. --command kustomize edit set image "${LXMF_BRIDGE_IMAGE_NAME}=${LXMF_BRIDGE_IMAGE_NAME}:${NEW_TAG}"

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No manifest changes; nothing to commit."
            exit 0
          fi
          git add manifests/bluebubbles-chatgpt-agent
          git commit -m "Update Kube manifest [skip ci]"

      - name: Rebase onto latest main
        run: |
          git pull --rebase origin main

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin HEAD:main

  linear_release:
    name: Sync Linear Release
    needs: update_manifest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Sync Linear release
        uses: linear/linear-release-action@ad7da502eec3a93dd17e2e249e6c1cd84e3ee588
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          version: ${{ github.sha }}-${{ github.run_number }}
