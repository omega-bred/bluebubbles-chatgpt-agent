name: iOS App Clip TestFlight Release

on:
  workflow_dispatch:
    inputs:
      beta_groups:
        description: Comma-separated TestFlight beta group names or IDs.
        required: false
        default: Internal Testers
      build_number:
        description: CFBundleVersion to upload. Defaults to the next safe App Store Connect build number.
        required: false
        default: ''
      test_notes:
        description: What to Test notes. Defaults to commit and run metadata.
        required: false
        default: ''
      notify_testers:
        description: Notify testers after assigning the build to groups.
        required: false
        default: false
        type: boolean
      submit_beta_review:
        description: Submit the build for beta app review after upload.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  testflight:
    name: Build and Upload TestFlight
    runs-on: macos-latest
    environment: app-store-connect
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Show Nix toolchain
        run: |
          BBAGENT_NIX_SHELL_QUIET=1 nix develop --command java -version
          BBAGENT_NIX_SHELL_QUIET=1 nix develop --command ./gradlew --version
          BBAGENT_NIX_SHELL_QUIET=1 nix develop --command asc --version

      - name: Configure 1Password service account
        uses: 1password/load-secrets-action/configure@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Load App Store Connect secrets
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0
        with:
          export-env: true
        env:
          ASC_KEY_ID: "op://tyum5kfqny2dlv7mufamoiavyi/gen33eow25m5fcsy2ocispkwyy/key_id"
          ASC_ISSUER_ID: "op://tyum5kfqny2dlv7mufamoiavyi/gen33eow25m5fcsy2ocispkwyy/issuer_id"
          ASC_APP_ID: "op://tyum5kfqny2dlv7mufamoiavyi/gen33eow25m5fcsy2ocispkwyy/app_id"

      - name: Prepare App Store Connect API key for Xcode
        run: |
          set -euo pipefail

          if [ -z "${ASC_KEY_ID:-}" ] || [ -z "${ASC_ISSUER_ID:-}" ] || [ -z "${ASC_APP_ID:-}" ]; then
            echo "Missing one or more App Store Connect fields from 1Password" >&2
            exit 1
          fi

          auth_key_path="${RUNNER_TEMP}/AuthKey_${ASC_KEY_ID}.p8"
          mkdir -p "$(dirname "$auth_key_path")"
          op read 'op://tyum5kfqny2dlv7mufamoiavyi/gen33eow25m5fcsy2ocispkwyy/AuthKey_NR47RVCL92.p8' > "$auth_key_path"
          chmod 600 "$auth_key_path"
          if [ ! -s "$auth_key_path" ]; then
            echo "App Store Connect private key attachment was empty" >&2
            exit 1
          fi
          {
            echo "ASC_KEY_ID=$ASC_KEY_ID"
            echo "ASC_ISSUER_ID=$ASC_ISSUER_ID"
            echo "ASC_APP_ID=$ASC_APP_ID"
            echo "ASC_AUTH_KEY_PATH=$auth_key_path"
            echo "ASC_PRIVATE_KEY_PATH=$auth_key_path"
          } >> "$GITHUB_ENV"

      - name: Validate App Store Connect auth
        run: |
          set -euo pipefail
          BBAGENT_NIX_SHELL_QUIET=1 nix develop --command asc auth status --validate
          BBAGENT_NIX_SHELL_QUIET=1 nix develop --command asc apps view --id "$ASC_APP_ID" --output json >/dev/null

      - name: Ensure App Clip signing assets
        env:
          ASC_VAULT_ID: tyum5kfqny2dlv7mufamoiavyi
          SIGNING_ITEM_TITLE: BlueChat App Clip CI Signing Assets
          MAIN_BUNDLE_RESOURCE_ID: SRKX6DJQPJ
          CLIP_BUNDLE_RESOURCE_ID: 9657HFRZMD
          MAIN_PROFILE_NAME: BlueChatAI GitHub Actions App Store Main
          CLIP_PROFILE_NAME: BlueChatAI GitHub Actions App Store Clip
          KNOWN_VALID_DISTRIBUTION_CERTIFICATE_ID: QUU8C54UCP
        run: |
          set -euo pipefail

          jq_nix() {
            BBAGENT_NIX_SHELL_QUIET=1 nix develop --command jq "$@"
          }

          asc_nix() {
            BBAGENT_NIX_SHELL_QUIET=1 nix develop --command asc "$@"
          }

          signing_dir="${RUNNER_TEMP}/appclip-signing"
          mkdir -p "$signing_dir"
          signing_item_json="${signing_dir}/signing-item.json"

          if ! op item get "$SIGNING_ITEM_TITLE" --vault "$ASC_VAULT_ID" --format json > "$signing_item_json" 2>/dev/null; then
            echo "Creating App Clip CI signing assets in 1Password"
            bootstrap_dir="${signing_dir}/bootstrap"
            mkdir -p "$bootstrap_dir"

            p12_password="$(openssl rand -base64 32)"
            certificate_json="${bootstrap_dir}/certificate.json"

            create_distribution_certificate() {
              asc_nix certificates create \
                --certificate-type IOS_DISTRIBUTION \
                --generate-csr \
                --common-name "BlueChat GitHub Actions" \
                --key-out "${bootstrap_dir}/distribution.key" \
                --csr-out "${bootstrap_dir}/distribution.csr" \
                --force \
                --output json > "$certificate_json"
            }

            if ! create_distribution_certificate; then
              certificates_json="${bootstrap_dir}/certificates.json"
              asc_nix certificates list --certificate-type IOS_DISTRIBUTION --output json > "$certificates_json"
              orphan_certificate_ids="$(
                jq_nix -r '
                  .data[]? |
                  select(
                    (
                      .attributes.name //
                      .attributes.displayName //
                      .attributes.serialNumber //
                      ""
                    ) | contains("BlueChat GitHub Actions")
                  ) |
                  .id
                ' "$certificates_json"
              )"

              if [ -z "$orphan_certificate_ids" ]; then
                orphan_certificate_ids="$(
                  jq_nix -r '
                    .data[]? |
                    select(
                      .id == "XZF2PJ8696" and
                      ((.attributes.expirationDate // "") | startswith("2027-06-02T07:53:35"))
                    ) |
                    .id
                  ' "$certificates_json"
                )"
              fi

              if [ -z "$orphan_certificate_ids" ]; then
                orphan_certificate_ids="$(
                  jq_nix -r --arg keep_id "$KNOWN_VALID_DISTRIBUTION_CERTIFICATE_ID" '
                    .data[]? |
                    select(.id != $keep_id) |
                    .id
                  ' "$certificates_json"
                )"
              fi

              if [ -z "$orphan_certificate_ids" ]; then
                echo "Certificate creation failed and no BlueChat GitHub Actions certificate was found to revoke." >&2
                echo "Current iOS Distribution certificates:" >&2
                jq_nix -r '
                  .data[]? |
                  "- id=\(.id) name=\(.attributes.name // "") displayName=\(.attributes.displayName // "") expires=\(.attributes.expirationDate // "")"
                ' "$certificates_json" >&2
                exit 1
              fi

              while IFS= read -r orphan_certificate_id; do
                if [ -n "$orphan_certificate_id" ]; then
                  echo "Revoking orphaned BlueChat GitHub Actions distribution certificate ${orphan_certificate_id}"
                  asc_nix certificates revoke --id "$orphan_certificate_id" --confirm >/dev/null
                fi
              done <<< "$orphan_certificate_ids"

              create_distribution_certificate
            fi

            certificate_id="$(jq_nix -r '.data.id // .id // empty' "$certificate_json")"
            certificate_content="$(
              jq_nix -r '
                .data.attributes.certificateContent //
                .attributes.certificateContent //
                .certificateContent //
                empty
              ' "$certificate_json"
            )"
            if [ -z "$certificate_id" ] || [ -z "$certificate_content" ]; then
              echo "Could not resolve created distribution certificate details" >&2
              exit 1
            fi

            certificate_pem="${bootstrap_dir}/distribution.pem"
            if printf '%s' "$certificate_content" | grep -q -- '-----BEGIN CERTIFICATE-----'; then
              printf '%s\n' "$certificate_content" > "$certificate_pem"
            else
              printf '%s' "$certificate_content" | base64 -D > "${bootstrap_dir}/distribution.der"
              openssl x509 -inform DER -in "${bootstrap_dir}/distribution.der" -out "$certificate_pem"
            fi

            openssl pkcs12 -export \
              -inkey "${bootstrap_dir}/distribution.key" \
              -in "$certificate_pem" \
              -out "${bootstrap_dir}/distribution.p12" \
              -passout "pass:${p12_password}" \
              -name "BlueChat CI iOS Distribution"

            create_profile() {
              local profile_name="$1"
              local bundle_resource_id="$2"
              local output_path="$3"
              local profile_json="${bootstrap_dir}/${profile_name// /-}.json"
              local profile_id

              asc_nix profiles create \
                --name "$profile_name" \
                --profile-type IOS_APP_STORE \
                --bundle "$bundle_resource_id" \
                --certificate "$certificate_id" \
                --output json > "$profile_json"
              profile_id="$(jq_nix -r '.data.id // .id // empty' "$profile_json")"
              if [ -z "$profile_id" ]; then
                echo "Could not resolve created provisioning profile id for ${profile_name}" >&2
                exit 1
              fi

              asc_nix profiles download --id "$profile_id" --output "$output_path"
            }

            create_profile "$MAIN_PROFILE_NAME" "$MAIN_BUNDLE_RESOURCE_ID" "${bootstrap_dir}/main-app-store.mobileprovision"
            create_profile "$CLIP_PROFILE_NAME" "$CLIP_BUNDLE_RESOURCE_ID" "${bootstrap_dir}/clip-app-store.mobileprovision"

            op item create \
              --category secure-note \
              --vault "$ASC_VAULT_ID" \
              --title "$SIGNING_ITEM_TITLE" \
              "p12_password[password]=${p12_password}" \
              "certificate_id[text]=${certificate_id}" \
              "main_profile_name[text]=${MAIN_PROFILE_NAME}" \
              "clip_profile_name[text]=${CLIP_PROFILE_NAME}" \
              "distribution_certificate_p12[file]=${bootstrap_dir}/distribution.p12" \
              "main_app_store_profile[file]=${bootstrap_dir}/main-app-store.mobileprovision" \
              "clip_app_store_profile[file]=${bootstrap_dir}/clip-app-store.mobileprovision" >/dev/null

            unset p12_password
            op item get "$SIGNING_ITEM_TITLE" --vault "$ASC_VAULT_ID" --format json > "$signing_item_json"
          fi

          field_reference() {
            local label="$1"
            local reference
            reference="$(jq_nix -r --arg label "$label" '.fields[]? | select(.label == $label) | .reference // empty' "$signing_item_json" | head -n 1)"
            if [ -z "$reference" ]; then
              echo "Missing ${label} in 1Password signing item" >&2
              exit 1
            fi
            printf '%s' "$reference"
          }

          p12_path="${signing_dir}/distribution.p12"
          main_profile_path="${signing_dir}/main-app-store.mobileprovision"
          clip_profile_path="${signing_dir}/clip-app-store.mobileprovision"

          op read "$(field_reference distribution_certificate_p12)" > "$p12_path"
          op read "$(field_reference main_app_store_profile)" > "$main_profile_path"
          op read "$(field_reference clip_app_store_profile)" > "$clip_profile_path"
          p12_password="$(op read "$(field_reference p12_password)")"

          install_profile() {
            local profile_path="$1"
            local plist_path="${profile_path}.plist"
            local profile_uuid

            security cms -D -i "$profile_path" > "$plist_path"
            profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$plist_path")"
            mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
            cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/${profile_uuid}.mobileprovision"
          }

          install_profile "$main_profile_path"
          install_profile "$clip_profile_path"

          keychain_path="${RUNNER_TEMP}/appclip-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          existing_keychains="$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')"
          security list-keychains -d user -s "$keychain_path" $existing_keychains
          security import "$p12_path" \
            -k "$keychain_path" \
            -P "$p12_password" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"
          unset p12_password keychain_password

      - name: Generate Swift OpenAPI client
        run: CI=true BBAGENT_NIX_SHELL_QUIET=1 nix develop --command ./gradlew copySwiftClientToAppClip

      - name: Verify Swift OpenAPI client is current
        run: git diff --exit-code -- appclip/Generated/BlueChatAgentClient

      - name: Stamp build number
        env:
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail

          build_number="$INPUT_BUILD_NUMBER"
          if [ -z "$build_number" ]; then
            next_build_json="$(
              BBAGENT_NIX_SHELL_QUIET=1 nix develop --command asc builds next-build-number \
                --app "$ASC_APP_ID" \
                --platform IOS \
                --initial-build-number "$GITHUB_RUN_NUMBER" \
                --output json
            )"
            build_number="$(
              printf '%s' "$next_build_json" |
                BBAGENT_NIX_SHELL_QUIET=1 nix develop --command jq -r '
                  if type == "number" then tostring
                  elif type == "string" then .
                  elif type == "object" then
                    (
                      .buildNumber //
                      .build_number //
                      .nextBuildNumber //
                      .next_build_number //
                      .number //
                      .value //
                      empty
                    ) | tostring
                  else
                    empty
                  end
                '
            )"
          fi

          if [ -z "$build_number" ]; then
            echo "Could not resolve a build number" >&2
            exit 1
          fi

          version_number="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' appclip/BlueChat/Info.plist)"
          if [ -z "$version_number" ]; then
            echo "Could not resolve a version number" >&2
            exit 1
          fi

          echo "BUILD_NUMBER=$build_number" >> "$GITHUB_ENV"
          echo "VERSION_NUMBER=$version_number" >> "$GITHUB_ENV"
          BBAGENT_NIX_SHELL_QUIET=1 nix develop --command asc xcode version edit \
            --project appclip/BlueChat.xcodeproj \
            --build-number "$build_number" \
            --output json

      - name: Build, upload, and distribute to TestFlight
        env:
          INPUT_BETA_GROUPS: ${{ inputs.beta_groups }}
          INPUT_NOTIFY_TESTERS: ${{ inputs.notify_testers }}
          INPUT_SUBMIT_BETA_REVIEW: ${{ inputs.submit_beta_review }}
          INPUT_TEST_NOTES: ${{ inputs.test_notes }}
        run: |
          set -euo pipefail

          mkdir -p appclip/.asc/artifacts

          test_notes="$INPUT_TEST_NOTES"
          if [ -z "$test_notes" ]; then
            test_notes="GitHub Actions build ${GITHUB_SHA} (${GITHUB_RUN_NUMBER})"
          fi

          args=(
            publish testflight
            --app "$ASC_APP_ID"
            --project appclip/BlueChat.xcodeproj
            --scheme BlueChat
            --configuration Release
            --clean
            --archive-path appclip/.asc/artifacts/BlueChat.xcarchive
            --export-options appclip/ExportOptions.plist
            --ipa-path appclip/.asc/artifacts/BlueChat.ipa
            --version "$VERSION_NUMBER"
            --build-number "$BUILD_NUMBER"
            --test-notes "$test_notes"
            --locale en-US
            --wait
            --timeout 60m
            --output json
            --archive-xcodebuild-flag -destination
            --archive-xcodebuild-flag "generic/platform=iOS"
            --archive-xcodebuild-flag -allowProvisioningUpdates
            --archive-xcodebuild-flag -authenticationKeyPath
            --archive-xcodebuild-flag "$ASC_AUTH_KEY_PATH"
            --archive-xcodebuild-flag -authenticationKeyID
            --archive-xcodebuild-flag "$ASC_KEY_ID"
            --archive-xcodebuild-flag -authenticationKeyIssuerID
            --archive-xcodebuild-flag "$ASC_ISSUER_ID"
            --archive-xcodebuild-flag -hideShellScriptEnvironment
            --export-xcodebuild-flag -allowProvisioningUpdates
            --export-xcodebuild-flag -authenticationKeyPath
            --export-xcodebuild-flag "$ASC_AUTH_KEY_PATH"
            --export-xcodebuild-flag -authenticationKeyID
            --export-xcodebuild-flag "$ASC_KEY_ID"
            --export-xcodebuild-flag -authenticationKeyIssuerID
            --export-xcodebuild-flag "$ASC_ISSUER_ID"
          )

          beta_groups="$INPUT_BETA_GROUPS"
          if [ -n "$beta_groups" ]; then
            args+=(--group "$beta_groups")
          fi

          if [ "$INPUT_NOTIFY_TESTERS" = "true" ]; then
            args+=(--notify)
          fi

          if [ "$INPUT_SUBMIT_BETA_REVIEW" = "true" ]; then
            args+=(--submit --confirm)
          fi

          BBAGENT_NIX_SHELL_QUIET=1 nix develop --command asc "${args[@]}"
